<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundCloud Insights</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand-wrap">
        <h1 class="page-title">Insights</h1>

        <nav class="tabs">
          <button class="tab active">SoundCloud</button>
          <button class="tab">All Platforms</button>
          <button class="tab">
            Fans
            <span class="tab-badge">NEW</span>
          </button>
        </nav>
      </div>

      <div class="top-actions">
        <select id="rangeSelect" class="range-select">
          <option value="yearly">All time</option>
          <option value="monthly">This year</option>
          <option value="daily">This month</option>
        </select>
      </div>
    </header>

    <section class="hero">
      <div class="hero-title-row">
        <h2 class="hero-title">
          <span id="headlinePlays">0</span> plays since <span id="sinceYear">2016</span>
          <span id="growthText" class="growth">(+0)</span>
        </h2>
      </div>

      <div class="hero-meta-row">
        <div class="chip chip-light">
          <span class="chip-icon">▶</span>
          <span id="playsChipValue">0 plays</span>
        </div>

        <div class="chip">
          <span class="chip-icon">♥</span>
          <span id="likesChipValue">0 likes</span>
        </div>

        <div class="chip">
          <span class="chip-icon">💬</span>
          <span id="commentsChipValue">0 comments</span>
        </div>

        <div class="chip">
          <span class="chip-icon">↻</span>
          <span id="repostsChipValue">0 reposts</span>
        </div>

        <div class="chip">
          <span class="chip-icon">↓</span>
          <span id="downloadsChipValue">0 downloads</span>
        </div>

        <div class="hero-side-meta">
          <span class="meta-muted">Data updates every 30 sec</span>
          <span class="meta-strong" id="periodLabel">2016 - Present</span>
        </div>
      </div>
    </section>

    <section class="chart-block">
      <div class="chart-grid">
        <div class="y-axis" id="yAxis"></div>
        <div class="bars" id="chartArea"></div>
      </div>
    </section>

    <section class="panels">
      <article class="panel">
        <div class="panel-head">
          <div>
            <h3 class="panel-title">Top tracks</h3>
            <div class="panel-subtitle">All time</div>
          </div>
        </div>

        <div class="track-list" id="trackList"></div>
      </article>

      <article class="panel panel-side">
        <div class="panel-head">
          <div>
            <h3 class="panel-title">Overview</h3>
            <div class="panel-subtitle">Current totals</div>
          </div>
        </div>

        <div class="overview-grid">
          <div class="overview-card accent">
            <span class="overview-label">Plays</span>
            <span class="overview-value" id="playsValue">0</span>
          </div>

          <div class="overview-card">
            <span class="overview-label">Likes</span>
            <span class="overview-value" id="likesValue">0</span>
          </div>

          <div class="overview-card">
            <span class="overview-label">Comments</span>
            <span class="overview-value" id="commentsValue">0</span>
          </div>

          <div class="overview-card">
            <span class="overview-label">Reposts</span>
            <span class="overview-value" id="repostsValue">0</span>
          </div>

          <div class="overview-card">
            <span class="overview-label">Downloads</span>
            <span class="overview-value" id="downloadsValue">0</span>
          </div>

          <div class="overview-card">
            <span class="overview-label">Tracks</span>
            <span class="overview-value" id="trackCountValue">0</span>
          </div>
        </div>

        <div class="status-box">
          <div class="status-row">
            <span class="status-label">Artist</span>
            <span class="status-value" id="artistName">AREKKUZZERA</span>
          </div>
          <div class="status-row">
            <span class="status-label">Source</span>
            <span class="status-value" id="trackTitle">All Tracks</span>
          </div>
          <div class="status-row">
            <span class="status-label">Updated</span>
            <span class="status-value" id="lastUpdate">Starting...</span>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="app.js?v=7"></script>
</body>
</html>

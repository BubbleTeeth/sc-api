<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundCloud Analytics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="dashboard">
    <div class="topbar">
      <div>
        <h1>Insights</h1>
        <div class="tabs">
          <button class="tab active">SoundCloud</button>
          <button class="tab">All Platforms</button>
          <button class="tab">Fans</button>
        </div>
      </div>

      <div class="controls">
        <select id="rangeSelect">
          <option value="yearly">All time</option>
          <option value="monthly">This year</option>
          <option value="daily">This month</option>
        </select>
      </div>
    </div>

    <section class="hero">
      <div class="headline">
        <span id="headlinePlays">0</span> plays since <span id="sinceYear">2016</span>
        <span class="growth" id="growthText">(+0)</span>
      </div>

      <div class="submeta">
        <span id="trackTitle">Loading track...</span>
        <span id="lastUpdate">Starting...</span>
      </div>
    </section>

    <section class="metrics">
      <div class="metric metric-main">
        <div class="metric-label">Plays</div>
        <div class="metric-value" id="playsValue">0</div>
      </div>

      <div class="metric">
        <div class="metric-label">Likes</div>
        <div class="metric-value" id="likesValue">0</div>
      </div>

      <div class="metric">
        <div class="metric-label">Comments</div>
        <div class="metric-value" id="commentsValue">0</div>
      </div>

      <div class="metric">
        <div class="metric-label">Reposts</div>
        <div class="metric-value" id="repostsValue">0</div>
      </div>

      <div class="metric">
        <div class="metric-label">Downloads</div>
        <div class="metric-value" id="downloadsValue">1</div>
      </div>
    </section>

    <section class="chart-card">
      <div class="chart-top">
        <div>
          <div class="chart-title">Play history</div>
          <div class="chart-subtitle" id="chartSubtitle">All-time yearly view</div>
        </div>
      </div>

      <div class="chart-shell">
        <div class="y-axis" id="yAxis"></div>
        <div class="bars" id="chartArea"></div>
      </div>
    </section>
  </main>

  <script src="app.js?v=4"></script>
</body>
</html>
